  <style>
    :root{
      --bg0:#070b14; --bg1:#0b1220; --line: rgba(255,255,255,.12);

      --ok:#35c27c; --bad:#ff5a6a; --warn:#ffcc66; --shadow: 0 18px 60px rgba(0,0,0,.45);

    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family: ui-sans-serif, system-ui, sans-serif; color:var(--text); background: radial-gradient(1200px 700px at 20% 10%, rgba(122,162,255,.18), transparent 60%), linear-gradient(180deg, var(--bg1), var(--bg0)); }
    .wrap{ max-width: 980px; margin: 0 auto; padding: 18px 14px 28px; }
    header{ position: sticky; top:0; z-index: 50; backdrop-filter: blur(10px); background: rgba(11,18,32,.85); border-bottom: 1px solid var(--line); }
    .head-inner{ max-width: 980px; margin: 0 auto; padding: 14px; display:flex; justify-content: space-between; align-items:center; flex-wrap:wrap; }
    .titlebox h1{ font-size: 16px; margin:0; } .sub{ color: var(--muted); font-size: 12px; }
    .pill{ border:1px solid var(--line); background: rgba(255,255,255,.05); padding: 8px 10px; border-radius: 999px; color: var(--muted); font-size: 12px; }
    .btn{ border:1px solid var(--line); background: rgba(255,255,255,.06); color: var(--text); padding: 10px 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .btn.primary{ background: var(--accent); color:var(--bg1); border:none; }
    .btn.danger{ background: var(--bad); color:white; border:none; }
    .card{ border: 1px solid var(--line); background: rgba(255,255,255,.05); border-radius: var(--radius); padding:20px; box-shadow: var(--shadow); }
    .main{ display:grid; grid-template-columns: 1fr; gap: 14px; margin-top: 14px; }
    @media (min-width: 900px){ .main{ grid-template-columns: 320px 1fr; align-items:start; } }
    .tabs{ display:flex; gap:10px; margin-bottom: 15px; }
    .tab{ padding: 8px 15px; border-radius: 999px; font-size: 13px; font-weight:bold; cursor:pointer; background:rgba(255,255,255,.05); }
    .tab.active{ background:var(--accent); color:var(--bg1); }
    .stat{ border:1px solid var(--line); background:rgba(0,0,0,.2); padding:10px; border-radius:12px; margin-bottom:10px;}
    .stat .val{ font-size: 20px; font-weight:bold; color:var(--accent); }
    .qtitle{ font-size: 16px; font-weight: bold; margin-bottom: 15px; line-height:1.5; }
    .opt{ border:1px solid var(--line); background:rgba(255,255,255,.03); padding:12px; border-radius:12px; margin-bottom:8px; cursor:pointer; display:flex; gap:10px;}
    .opt.selected{ border-color:var(--accent); background:rgba(122,162,255,.15); }
    .opt.correct{ border-color:var(--ok); background:rgba(53,194,124,.15); }
    .opt.wrong{ border-color:var(--bad); background:rgba(255,90,106,.15); }
    .feedback{ margin-top:15px; padding:15px; background:rgba(0,0,0,.3); border-left:4px solid var(--accent); border-radius:8px; display:none; font-size:14px; line-height:1.5;}
    textarea{ width:100%; min-height:200px; border-radius:12px; background:rgba(0,0,0,.3); border:1px solid var(--line); padding:15px; color:white; font-family:inherit; outline:none;}
  </style>

let mode = 'PG'; let curPG = 0; let curES = 0; 
let ansPG = new Array(50).fill(null); let ansES = new Array(10).fill('');

function setMode(m){ 
  mode=m; 
  document.getElementById('tabPG').className = mode==='PG'?'tab active':'tab';
  document.getElementById('tabES').className = mode==='ES'?'tab active':'tab';
  render(); 
}

function calcScore(){
  let correct = 0; let answered = 0;
  for(let i=0; i<BANK_PG.length; i++){ if(ansPG[i] !== null){ answered++; if(ansPG[i] === BANK_PG[i].ans) correct++; } }
  let pct = answered === 0 ? 0 : Math.round((correct/50)*100);
  document.getElementById('skorDisplay').innerText = pct + '%';
  let esaiAns = ansES.filter(x => x.trim().length > 10).length;
  document.getElementById('esaiDisplay').innerText = esaiAns + '/10';
}

function selectOpt(idx){ if(ansPG[curPG] !== null) return; ansPG[curPG] = idx; render(); }

function saveES(val){ ansES[curES] = val; calcScore(); }

function next(){
  if(mode === 'PG' && curPG < 49) curPG++;
  if(mode === 'ES' && curES < 9) curES++;
  render();
}
function prev(){
  if(mode === 'PG' && curPG > 0) curPG--;
  if(mode === 'ES' && curES > 0) curES--;
  render();
}
function resetAll(){
  if(confirm('Yakin ingin reset semua jawaban PG dan Esai?')){
    ansPG.fill(null); ansES.fill(''); curPG=0; curES=0; render();
  }
}

function render(){
  calcScore();
  let html = '';
  if(mode === 'PG'){
    document.getElementById('pillIndex').innerText = `PG Soal ${curPG+1}/50`;
    let q = BANK_PG[curPG];
    html += `<div class="qtitle">${curPG+1}. ${q.q}</div>`;
    q.opts.forEach((opt, idx) => {
      let cls = 'opt';
      if(ansPG[curPG] !== null){
        if(idx === q.ans) cls += ' correct';
        else if(idx === ansPG[curPG]) cls += ' wrong';
        else cls += ' disabled';
      }
      html += `<div class="${cls}" onclick="selectOpt(${idx})"><div style="font-weight:bold; width:20px;">${String.fromCharCode(65+idx)}.</div><div>${opt}</div></div>`;
    });
    if(ansPG[curPG] !== null){
      html += `<div class="feedback" style="display:block;"><b>Pembahasan:</b> ${q.exp}</div>`;
    }
  } else {
    document.getElementById('pillIndex').innerText = `ESAI Soal ${curES+1}/10`;
    html += `<div class="qtitle">${curES+1}. ${BANK_ESAY[curES].q}</div>`;
    html += `<textarea oninput="saveES(this.value)" placeholder="Ketik argumen dan analisis Anda di sini... (otomatis tersimpan)">${ansES[curES]}</textarea>`;
  }
  
  html += `<div style="display:flex; justify-content:space-between; margin-top:20px;">
    <button class="btn" onclick="prev()">Kembali</button>
    <button class="btn primary" onclick="next()">Lanjut</button>
  </div>`;
  document.getElementById('contentArea').innerHTML = html;
}

// Init
render();
</script>
</body>
</html>
